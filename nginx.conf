events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Dynamic log output to stdout/stderr for Docker container logs
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Allow large files to be uploaded (up to 500MB videos)
    client_max_body_size 500M;

    server {
        listen 10000;

        # Route API requests to FastAPI backend
        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Route media files to FastAPI backend's media folder
        location /media/ {
            proxy_pass http://127.0.0.1:8000/media/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Route all other requests to Next.js frontend
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
